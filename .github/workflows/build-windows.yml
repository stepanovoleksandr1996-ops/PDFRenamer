name: Build PDFRenamer

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >
            git
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt5
            mingw-w64-x86_64-poppler
            mingw-w64-x86_64-pkg-config

      - name: Configure
        run: |
          cmake -B build -G Ninja

      - name: Build
        run: |
          cmake --build build -j4

      - name: Create portable package
        run: |
          mkdir -p portable/platforms
          mkdir -p portable/styles
          mkdir -p portable/imageformats
          mkdir -p portable/Runtime/LibreOffice

          cp build/PDFRenamer.exe portable/

          echo "===== Copy Qt DLL ====="

          cp /mingw64/bin/Qt5Core.dll portable/ || true
          cp /mingw64/bin/Qt5Gui.dll portable/ || true
          cp /mingw64/bin/Qt5Widgets.dll portable/ || true

          echo "===== Copy MinGW Runtime ====="

          cp /mingw64/bin/libstdc++-6.dll portable/ || true
          cp /mingw64/bin/libgcc_s_seh-1.dll portable/ || true
          cp /mingw64/bin/libwinpthread-1.dll portable/ || true

          echo "===== Copy Poppler ====="

          cp /mingw64/bin/libpoppler-162.dll portable/ || true
          cp /mingw64/bin/libpoppler-cpp-3.dll portable/ || true
          cp /mingw64/bin/libpoppler-glib-8.dll portable/ || true

          echo "===== Copy Poppler Dependencies ====="

          cp /mingw64/bin/libfontconfig-1.dll portable/ || true
          cp /mingw64/bin/libfreetype-6.dll portable/ || true
          cp /mingw64/bin/libjpeg-8.dll portable/ || true
          cp /mingw64/bin/liblcms2-2.dll portable/ || true
          cp /mingw64/bin/libopenjp2-7.dll portable/ || true
          cp /mingw64/bin/libpng16-16.dll portable/ || true
          cp /mingw64/bin/libtiff-6.dll portable/ || true
          cp /mingw64/bin/zlib1.dll portable/ || true

          echo "===== Copy Qt Plugins ====="

          cp /mingw64/share/qt5/plugins/platforms/qwindows.dll portable/platforms/ || true
          cp /mingw64/share/qt5/plugins/imageformats/*.dll portable/imageformats/ || true
          cp /mingw64/share/qt5/plugins/styles/*.dll portable/styles/ || true

          echo
          echo "===== Portable package ====="
          find portable

      - name: Upload Portable
        uses: actions/upload-artifact@v4
        with:
          name: PDFRenamer_Portable
          path: portable